<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2 da lista</title>
</head>
<body>
    <form action="">
        Nota 1 : <br/>
        <input type="text" id="n1"><br/>
        Nota 2 : <br/>
        <input type="text" id="n2"><br/>
        <br/>
        <input type="button" onclick="calculo()" value="Calcular" />
        <input type="reset" value="limpar" />
        <br/>
        Resultado: <br/>
        <input type="text" id="resultado" readonly="readonly" />
    </form>
</body>
<script>
    function calculo(){
        //entrada
        let n1 = parseFloat(document.getElementById('n1').value);
        let n2 = parseFloat(document.getElementById('n2').value);
        // Cálculo
        let soma = n1 + n2;
        let media = soma / 2;
        //let media = (n1 + n2)/2
        // estrutura de condição
        if (media >=7){
            document.getElementById('resultado').value = 'Aprovado !!!';
        }else{
            document.getElementById('resultado').value = 'Reprovado !!!';
        }

    }
</script>
</html>
