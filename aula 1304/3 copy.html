<script>
    // entrada
let n1 = parseInt(prompt("Digite o valor do 1° numero"));
let n2 = parseInt(prompt("Digite o valor do 2° numero"));


    // processamento
let soma = n1 + n2 ;
let sub = n1 - n2 ;
let mult = n1 * n2 ;
let potencia = n1 ** n2 ;


    // saída
    document.write("A soma foi :"+ soma);
    document.write("A subtração foi ; "+ sub);
    document.write(" A multiplicação foi : " + mult);
    document.write("A potencia de "+n1 + "elevado a : "+ n2 + " = "+ potencia+"<br/>");
    
</script>
